/* =========================================================
   SIMVE V6C — DETALHE INLINE NA TABELA VACINAL
   Remove o drawer fixo e exibe o detalhe apenas na linha clicada.
   ========================================================= */
.vacv2-inline-row td {
  background: #f8fbff !important;
  padding: 0 !important;
  border-bottom: 1px solid #dbe7f7 !important;
}
.vacv2-inline-detail {
  display: grid;
  grid-template-columns: minmax(0, 1.2fr) minmax(320px, .8fr);
  gap: 16px;
  padding: 16px;
  border-left: 4px solid #2563eb;
  box-shadow: inset 0 1px 0 rgba(37,99,235,.08);
}
.vacv2-inline-main,
.vacv2-inline-vaccines {
  background: #ffffff;
  border: 1px solid #d9e3f0;
  border-radius: 14px;
  padding: 14px;
  box-shadow: 0 8px 20px rgba(12,45,80,.05);
}
.vacv2-inline-title {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.vacv2-inline-label {
  display: inline-flex;
  padding: 4px 9px;
  border-radius: 999px;
  background: #e8f2ff;
  color: #1d6fd1;
  font-size: 11px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: .04em;
  margin-bottom: 6px;
}
.vacv2-inline-title h3 {
  margin: 0;
  color: #0f2744;
  font-size: 17px;
  font-weight: 950;
  line-height: 1.2;
}
.vacv2-inline-title p {
  margin: 4px 0 0;
  color: #64748b;
  font-size: 12px;
  font-weight: 700;
}
.vacv2-inline-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}
.vacv2-inline-grid div {
  background: #f8fbff;
  border: 1px solid #e2eaf5;
  border-radius: 12px;
  padding: 10px;
  min-width: 0;
}
.vacv2-inline-grid span {
  display: block;
  color: #64748b;
  font-size: 11px;
  font-weight: 900;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.vacv2-inline-grid strong {
  display: block;
  color: #0f2744;
  font-size: 12px;
  font-weight: 900;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.vacv2-inline-pendency {
  margin-top: 12px;
  padding: 12px;
  border-radius: 12px;
  background: #fff7ed;
  border: 1px solid #fed7aa;
  color: #9a3412;
}
.vacv2-inline-pendency strong,
.vacv2-inline-pendency small {
  display: block;
}
.vacv2-inline-pendency strong {
  font-size: 13px;
  font-weight: 950;
}
.vacv2-inline-pendency small {
  margin-top: 4px;
  font-size: 12px;
  font-weight: 700;
}
.vacv2-inline-vaccines h4 {
  margin: 0 0 12px;
  color: #0f2744;
  font-size: 15px;
  font-weight: 950;
}
.vacv2-chip-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.vacv2-vac-chip {
  display: inline-flex;
  align-items: center;
  max-width: 100%;
  padding: 7px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 900;
  line-height: 1.2;
  white-space: nowrap;
}
.vacv2-vac-chip.badge-ok,
.vacv2-vac-chip.ok {
  background: #e7f8ed;
  color: #15803d;
}
.vacv2-vac-chip.badge-danger,
.vacv2-vac-chip.danger {
  background: #ffe5e5;
  color: #dc2626;
}
.vacv2-vac-chip.badge-warning,
.vacv2-vac-chip.warning {
  background: #fff4dc;
  color: #d97706;
}
.vacv2-vac-chip.badge-neutral,
.vacv2-vac-chip.neutral,
.vacv2-vac-chip.gray {
  background: #eef2f7;
  color: #475569;
}
.vacv2-table tbody tr.selected > td {
  background: #eef6ff !important;
}
.vacv2-table .vacv2-icon-btn {
  min-width: 34px;
}
@media (max-width: 1200px) {
  .vacv2-inline-detail {
    grid-template-columns: 1fr;
  }
  .vacv2-inline-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}
@media (max-width: 720px) {
  .vacv2-inline-grid {
    grid-template-columns: 1fr;
  }
}
