                legend: { display: false },
                tooltip: {
                  callbacks: {
                    label: context => "Cobertura: " + context.raw + "%"
                  }
                }
              }
            }
          }));
        },

        async carregarGestao() {
          this.clearTopMessages();
          this.loading = true;

          try {
            const data = await this.gas("getPainelGestaoVacinal", this.sessionToken);
            this.gestao = data || this.gestao;

            await nextTick();
            this.renderGestaoCharts();
          } catch (err) {
            this.handleError(err);
          } finally {
            this.loading = false;
          }
        },

        renderGestaoCharts() {
          this.destroyChart("gestaoEvolucaoMunicipal");

          const el = document.getElementById("gestaoEvolucaoMunicipal");
          const dados = this.gestao.evolucaoMunicipal || { labels: [], values: [] };

          if (!el || !dados.labels.length) return;

          this.charts.gestaoEvolucaoMunicipal = markRaw(new Chart(el, {
            type: "line",
            data: {
              labels: dados.labels,
              datasets: [{
                label: "Cobertura municipal média (%)",
                data: (dados.values || []).map(v => Number(v || 0)),
                tension: 0.3,
                fill: false
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: {
                y: {
                  beginAtZero: true,
                  max: 100
                }
              },
              plugins: {
                legend: { display: false },
                tooltip: {
                  callbacks: {
                    label: (context) => `Cobertura média: ${context.raw}%`
                  }
                }
              }
            }
          }));
        },

        async carregarDocumentos() {
          this.clearTopMessages();
          this.loading = true;

          try {
            const lista = await this.gas("getDocumentos", this.sessionToken);
            this.documentos = Array.isArray(lista) ? lista : [];
          } catch (err) {
            this.handleError(err);
          } finally {
            this.loading = false;
          }
        },

        async enviarFeedback() {
          this.feedbackMsg = "";
          this.feedbackErro = "";
          this.clearTopMessages();
          this.loading = true;

          try {
            await this.gas(
              "enviarFeedback",
              this.sessionToken,
              this.feedback.tipo,
              String(this.feedback.mensagem || "").trim()
            );

            this.feedbackMsg = "Mensagem enviada com sucesso.";
            this.feedback = {
              tipo: "",
              mensagem: ""
            };
          } catch (err) {
            this.feedbackErro = err?.message || "Erro ao enviar feedback.";
          } finally {
            this.loading = false;
          }
        },

        async sair() {
          try {
            if (this.sessionToken) {
              await this.gas("encerrarSessao", this.sessionToken);
            }
          } catch (_) {
          } finally {
            Object.keys(this.charts || {}).forEach(nome => this.destroyChart(nome));
            this.sessionToken = "";
            this.sessionInfo = null;
            this.authView = "login";
            this.currentView = "ranking";
            this.profileMenuOpen = false;
            this.loading = false;
            this.topError = "";
            this.topSuccess = "";
            this.loginMsg = "";
            this.rankingHistorico = { labels: [], values: [], datasets: [], titulo: "Evolução mensal da cobertura vacinal" };
          }
        },

        getSortedFilteredList(lista, busca, sortKey, sortDir) {
          const termo = this.normalizeText(busca);
          let filtered = Array.isArray(lista) ? [...lista] : [];

          if (termo) {
            filtered = filtered.filter(item => {
              const alvo = [item.nome, item.cpf, item.cns, item.escola, item.turma].map(v => this.normalizeText(v)).join(' ');
              return alvo.includes(termo);
            });
          }

          filtered.sort((a, b) => {
            const av = this.normalizeForSort(a?.[sortKey]);
            const bv = this.normalizeForSort(b?.[sortKey]);

            if (typeof av === "number" && typeof bv === "number") {
              return sortDir === "asc" ? av - bv : bv - av;
            }

            if (av < bv) return sortDir === "asc" ? -1 : 1;
            if (av > bv) return sortDir === "asc" ? 1 : -1;
            return 0;
          });

          return filtered;
        },

        getPageItems(lista, pagination) {
          const start = (pagination.page - 1) * pagination.perPage;
          const end = start + pagination.perPage;
          return lista.slice(start, end);
        },

        getVisiblePages(current, total) {
          const pages = [];
          const start = Math.max(1, current - 2);
          const end = Math.min(total, current + 2);
          for (let i = start; i <= end; i++) pages.push(i);
          return pages;
        },

        goToPage(module, page) {
          if (module === "vacinal") {
            const safe = Math.min(Math.max(1, page), this.vacinalTotalPages);
            this.vacinal.pagination.page = safe;
          } else {
            const safe = Math.min(Math.max(1, page), this.cadastralTotalPages);
            this.cadastral.pagination.page = safe;
          }
        },

        toggleSort(module, key) {
          const target = module === "vacinal" ? this.vacinal : this.cadastral;

          if (target.sort.key === key) {
            target.sort.dir = target.sort.dir === "asc" ? "desc" : "asc";
          } else {
            target.sort.key = key;
            target.sort.dir = "asc";
          }

          target.pagination.page = 1;
        },

        getSortIndicator(module, key) {
          const target = module === "vacinal" ? this.vacinal : this.cadastral;
          if (target.sort.key !== key) return "↕";
          return target.sort.dir === "asc" ? "▲" : "▼";
        },

        exportCsv(filename, rows, columns) {
          if (!rows.length) {
            this.topError = "Não há dados para exportar.";
            return;
          }

          const escapeCsv = (value) => {
            const text = String(value ?? "");
            return `"${text.replace(/"/g, '""')}"`;
          };

          const header = columns.map(col => escapeCsv(col.label)).join(";");
          const body = rows.map(row =>
            columns.map(col => escapeCsv(row[col.key])).join(";")
          );

          const csvContent = [header, ...body].join("\n");
          const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
          const url = URL.createObjectURL(blob);

          const link = document.createElement("a");
          link.href = url;
          link.download = filename;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);

          this.topSuccess = "CSV exportado com sucesso.";
        },

        exportarCsvVacinal() {
          const rows = this.vacinalSortedFiltered.map(item => ({
            nome: item.nome,
            base: item.base || "",
            cpf: item.cpf || "",
            idade: item.idade,
            escola: item.escola,
            turma: item.turma,
            situacao: "Em atraso",
            vacinasAtraso: item.vacinasAtraso || ""
          }));

          this.exportCsv(
            `vacinal_${String(this.vacinal.form.segmento || 'todos').toLowerCase()}.csv`,
            rows,
            [
              { key: "nome", label: "Nome" },
              { key: "base", label: "Base" },
              { key: "cpf", label: "CPF" },
              { key: "idade", label: "Idade" },
              { key: "escola", label: "Escola" },
              { key: "turma", label: "Turma" },
              { key: "situacao", label: "Situação" },
              { key: "vacinasAtraso", label: "Vacinas em atraso" }
            ]
          );
        },


        exportarListaCadastralCpf() {
          const rows = (this.cadastralListaOrdenada || []).map(item => ({
            matricula: item.matricula || "",
            nome: item.nome || "",
            turma: item.turma || "",
            cpf: item.cpfNovo || item.cpf || "",
            situacao: item.semCpf ? "Sem CPF" : "CPF atualizado",
            escola: item.escola || "",
            base: item.base || ""
          }));

          this.exportCsv(
            `lista_cadastral_cpf_${new Date().toISOString().slice(0, 10)}.csv`,
            rows,
            [
              { key: "matricula", label: "MAT." },
              { key: "nome", label: "Nome do aluno" },
              { key: "turma", label: "Turma" },
              { key: "cpf", label: "CPF" },
              { key: "situacao", label: "Situação" },
              { key: "escola", label: "Escola" },
              { key: "base", label: "Base" }
            ]
          );
        },



        imprimirListaCadastralCpf() {
          const listaBase = this.cadastralListaOrdenada || [];

          const cpfPossuiOnzeDigitos = (valor) => {
            const n = this.onlyNumbers(valor || "");
            return n.length === 11;
          };

          // Para o PDF, a proposta aprovada é a lista nominal de pendências de CPF.
          // Portanto, remove da impressão alunos que já possuem CPF informado/válido na lista do sistema.
          const lista = listaBase.filter(item => {
            if (item.cpfSalvo) return false;
            if (item.semCpf === true) return true;
            const cpfAtual = item.cpfMascarado || item.cpf || item.cpfNovo || "";
            return !cpfPossuiOnzeDigitos(cpfAtual);
          });

          if (!lista.length) {
            this.topError = "Não há alunos sem CPF para imprimir neste recorte.";
            return;
          }

          const escapeHtml = (valor) => String(valor ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/\"/g, "&quot;")
            .replace(/'/g, "&#039;");

          const hoje = new Date();
          const dataHora = hoje.toLocaleString("pt-BR");
          const filtros = this.cadastralNovo.filtros || {};
          const mostrarEscola = this.cadastralNovo.perfilInicio !== "ESCOLA" && String(filtros.escola || "TODAS") === "TODAS";

          const escolaSessao = this.sessionInfo?.escola || (this.sessionInfo?.escolasPermitidas || [])[0] || "";
          const escolaTexto = this.cadastralNovo.perfilInicio === "ESCOLA"
            ? (escolaSessao || "Escola não identificada")
            : (filtros.escola && filtros.escola !== "TODAS" ? filtros.escola : "Todas as escolas");
          const turmaTexto = filtros.turma && filtros.turma !== "TODAS" ? this.resumirTurmaCadastral(filtros.turma) : "Todas";
          const tipoTexto = "Sem CPF";
          const buscaTexto = filtros.busca ? filtros.busca : "Sem busca textual";
          const ordenacaoTexto = this.labelOrdenacaoCadastral();

          const linhas = lista.map((item) => {
            const cpf = "-";
            const escolaTd = mostrarEscola ? `<td class="escola">${escapeHtml(this.resumirEscolaCadastral(item.escola || "-"))}</td>` : "";
            return `
              <tr>
                <td class="mat">${escapeHtml(item.matricula || "-")}</td>
                <td class="nome">${escapeHtml(item.nome || "NOME NÃO IDENTIFICADO")}</td>
                ${escolaTd}
                <td class="turma">${escapeHtml(this.resumirTurmaCadastral(item.turma || "-"))}</td>
                <td class="cpf">${escapeHtml(cpf)}</td>
                <td class="center"><span class="status">Sem CPF</span></td>
              </tr>`;
          }).join("");

          const escolaTh = mostrarEscola ? "<th>Escola</th>" : "";
          const html = `<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMVE - Lista nominal de inconsistências cadastrais</title>
  
</head>
<body>
  <div class="page">
    <section class="header">
      <div class="brand">
        <div class="logo"><span>SIM</span><strong>VE</strong></div>
        <small>Sistema de Monitoramento Vacinal Escolar</small>
      </div>
      <div class="title">
        <h1>Lista nominal de inconsistências cadastrais</h1>
        <p>Relatório operacional para saneamento cadastral</p>
        <p>Emitido em: ${escapeHtml(dataHora)}</p>
      </div>
    </section>

    <section class="meta">
      <div class="box">
        <h2>Filtros aplicados</h2>
        <div class="grid">
          <div class="item"><strong>Escola:</strong> ${escapeHtml(escolaTexto)}</div>
          <div class="item"><strong>Turma:</strong> ${escapeHtml(turmaTexto)}</div>
          <div class="item"><strong>Inconsistência:</strong> ${escapeHtml(tipoTexto)}</div>
          <div class="item"><strong>Busca:</strong> ${escapeHtml(buscaTexto)}</div>
          <div class="item"><strong>Ordenação:</strong> ${escapeHtml(ordenacaoTexto)}</div>
        </div>
      </div>
      <div class="box">
        <h2>Total do relatório</h2>
        <div class="total-number">${lista.length}</div>
        <div class="total-label">aluno(s) sem CPF</div>
      </div>
    </section>

    <table>
      <thead>
        <tr>
          <th>MAT.</th>
          <th>Nome do aluno</th>
          ${escolaTh}
          <th>Turma</th>
          <th>CPF</th>
          <th>Situação</th>
        </tr>
      </thead>
      <tbody>${linhas}</tbody>
    </table>

    <footer class="footer">
      <div class="credits">
        <strong>SIMVE – Sistema de Monitoramento Vacinal Escolar</strong><br>
        Desenvolvido por Germano César Quirino
      </div>
      <div>Relatório gerado automaticamente pelo SIMVE</div>
    </footer>
  </div>

  <div class="print-actions">
    <button class="ghost" onclick="window.close()">Fechar</button>
    <button onclick="window.print()">Imprimir / Salvar PDF</button>
  </div>
</body>
</html>`;

          const janela = window.open("", "_blank");
          if (!janela) {
            this.topError = "O navegador bloqueou a janela de impressão. Autorize pop-ups para o SIMVE.";
            return;
          }
          janela.document.open();
          janela.document.write(html);
          janela.document.close();
          setTimeout(() => janela.focus(), 300);
        },


        exportarCsvCadastral() {
          const rows = this.cadastralSortedFiltered.map(item => ({
            nome: item.nome,
            idade: item.idade,
            escola: item.escola,
            turma: item.turma,
            cpf: item.cpf || "",
            endereco: item.endereco || "",
            tipoInconsistencia: item.tipoInconsistencia || ""
          }));

          this.exportCsv(
            `cadastral_${this.cadastral.form.base.toLowerCase()}.csv`,
            rows,
            [
              { key: "nome", label: "Nome" },
              { key: "idade", label: "Idade" },
              { key: "escola", label: "Escola" },
              { key: "turma", label: "Turma" },
              { key: "cpf", label: "CPF" },
              { key: "endereco", label: "Endereço" },
              { key: "tipoInconsistencia", label: "Tipo" }
            ]
          );
        },


        async tentarRenderGraficoTurmaComRetry(labels, values, tentativas = 8, intervalo = 150) {
          let ultimoErro = "";
          for (let i = 0; i < tentativas; i++) {
            await nextTick();
            await new Promise(resolve => setTimeout(resolve, intervalo));

            const canvas = this.$refs?.vacChartTurmaCanvas || document.getElementById("vacChartTurma");
            this.vacinalDebug.atrasoPorTurma.canvasEncontrado = !!canvas;

            if (!canvas) {
              ultimoErro = "Canvas ainda não disponível na tentativa " + (i + 1);
              this.vacinalDebug.atrasoPorTurma.erro = ultimoErro;
              continue;
            }

            try {
              this.destroyChart("vacChartTurma");

              this.charts.vacChartTurma = markRaw(new Chart(canvas, {
                type: "bar",
                data: {
                  labels: (labels || []).map(label =>
                    String(label || "").replace(/^\s*(INF|ESC)\s*-\s*/i, "").trim()
                  ),
                  datasets: [{
                    label: "Alunos em atraso",
                    data: (values || []).map(v => Number(v || 0))
                  }]
                },
                plugins: [{
                  id: "valueLabelPluginRetry",
                  afterDatasetsDraw(chart) {
                    const { ctx } = chart;
                    ctx.save();
                    ctx.font = "bold 11px Arial";
                    ctx.fillStyle = "#243b5a";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "bottom";

                    chart.data.datasets.forEach((dataset, datasetIndex) => {
                      const meta = chart.getDatasetMeta(datasetIndex);
                      meta.data.forEach((element, index) => {
                        const value = dataset.data[index];
                        if (value === null || value === undefined || value === "") return;
                        const pos = element.tooltipPosition();
                        ctx.fillText(String(value), pos.x, pos.y - 6);
                      });
                    });

                    ctx.restore();
                  }
                }],
                options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  layout: { padding: { top: 22 } },
                  scales: {
                    y: { beginAtZero: true }
                  },
                  plugins: {
                    legend: { display: false },
                    tooltip: {
                      callbacks: {
                        label: (context) => `Alunos em atraso: ${context.raw}`
                      }
                    }
                  }
                }
              }));

              this.charts.vacChartTurma.resize();
              this.charts.vacChartTurma.update();
              this.vacinalDebug.atrasoPorTurma.chartCriado = true;
              this.vacinalDebug.atrasoPorTurma.erro = "";
              return true;
            } catch (e) {
              ultimoErro = e?.message || String(e);
              this.vacinalDebug.atrasoPorTurma.erro = ultimoErro;
            }
          }

          this.vacinalDebug.atrasoPorTurma.chartCriado = false;
          if (!this.vacinalDebug.atrasoPorTurma.erro) {
            this.vacinalDebug.atrasoPorTurma.erro = ultimoErro || "Não foi possível renderizar o gráfico após várias tentativas.";
          }
          return false;
        },

        handleError(error) {
          console.error(error);
          this.topError = error?.message || "Ocorreu um erro.";
        },

        destroyChart(name) {
          if (this.charts[name]) {
            this.charts[name].destroy();
            this.charts[name] = null;
          }
        }
      }
    }).mount("#app");
</script>
