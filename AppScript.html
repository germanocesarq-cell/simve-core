      mounted() {
        const usuarioSalvo = localStorage.getItem("simve_usuario") || "";
        const perfilSalvo = localStorage.getItem("simve_perfil") || "";
        if (usuarioSalvo) this.loginForm.usuario = usuarioSalvo;
        if (perfilSalvo) this.loginForm.perfil = perfilSalvo;
      },

      computed: {

        cadastralTotalPaginas() {
          const total = (this.cadastralNovo.lista || []).length;
          const porPagina = Number(this.cadastralNovo.porPagina || 25);
          return Math.max(1, Math.ceil(total / porPagina));
        },

        cadastralListaOrdenada() {
          return this.aplicarOrdenacaoCadastral(this.cadastralNovo.lista || []);
        },

        cadastralListaPaginada() {
          const pagina = Math.min(Math.max(1, Number(this.cadastralNovo.pagina || 1)), this.cadastralTotalPaginas);
          const porPagina = Number(this.cadastralNovo.porPagina || 25);
          const inicio = (pagina - 1) * porPagina;
          return (this.cadastralListaOrdenada || []).slice(inicio, inicio + porPagina);
        },

        cadastralInicioPagina() {
          if (!(this.cadastralNovo.lista || []).length) return 0;
          return ((Number(this.cadastralNovo.pagina || 1) - 1) * Number(this.cadastralNovo.porPagina || 25)) + 1;
        },

        cadastralFimPagina() {
          return Math.min((this.cadastralNovo.lista || []).length, Number(this.cadastralNovo.pagina || 1) * Number(this.cadastralNovo.porPagina || 25));
        },


        isAuthenticated() {
          return !!this.sessionToken && !!this.sessionInfo;
        },

        isGestor() {
          const perfil = String(this.sessionInfo?.perfil || "").toUpperCase();
          return perfil === "SAUDE" || perfil === "ADM";
        },

        isAdmin() {
          return String(this.sessionInfo?.perfil || "").toUpperCase() === "ADM";
        },

        escolasPermitidasLabel() {
          const lista = this.sessionInfo?.escolasPermitidas || [];
          return lista.length ? lista : ["Todas as escolas permitidas pela base"];
        },

        pageSubtitle() {
          const map = {
            inicio: "Visão geral do sistema",
            vacinal: "Consulta e acompanhamento da situação vacinal",
            gestao: "Resumo executivo para tomada de decisão",
            ranking: this.isGestor ? "Central de desempenho e análise comparativa" : "Início da escola",
            acessos: "Acompanhe os acessos das unidades e escolas ao sistema",
            admin: "Configurações administrativas do histórico",
            cadastral: "Acompanhe e corrija as inconsistências cadastrais dos alunos",
            documentos: "Documentos e materiais de apoio",
            feedback: "Canal de comunicação do sistema"
          };
          return map[this.currentView] || "Painel";
        },

        currentBaseLabel() {
          if (this.currentView === "vacinal") return this.vacinal.form.segmento || "-";
          if (this.currentView === "ranking") return this.isGestor ? "RANKING" : "DESEMPENHO";
          if (this.currentView === "acessos") return "ACESSOS";
          if (this.currentView === "admin") return "ADMIN";
          if (this.currentView === "cadastral") return this.cadastral.form.base;
          return this.homeResumo.base || this.sessionInfo?.base || "-";
        },




        rankingModalLista() {
          if (!this.ranking.modalTipo) return [];
          if (this.ranking.modalTipo === "escolas") return this.ranking.escolasPorCobertura || [];
          if (this.ranking.modalTipo === "unidades") return this.ranking.unidadesPorCobertura || [];
          if (this.ranking.modalTipo === "pendencias") return this.ranking.unidadesMaiorPendencia || [];
          return [];
        },

        rankingModalTotalPages() {
          const total = this.rankingModalLista.length;
          const porPagina = Number(this.ranking.modalPorPagina || 10);
          return Math.max(1, Math.ceil(total / porPagina));
        },

        rankingModalPageItems() {
          const page = Math.min(Math.max(1, Number(this.ranking.modalPagina || 1)), this.rankingModalTotalPages);
          const porPagina = Number(this.ranking.modalPorPagina || 10);
          const start = (page - 1) * porPagina;
          return this.rankingModalLista.slice(start, start + porPagina);
        },

        rankingModalStart() {
          if (!this.rankingModalLista.length) return 0;
          return ((Number(this.ranking.modalPagina || 1) - 1) * Number(this.ranking.modalPorPagina || 10)) + 1;
        },

        rankingModalEnd() {
          return Math.min(this.rankingModalLista.length, Number(this.ranking.modalPagina || 1) * Number(this.ranking.modalPorPagina || 10));
        },

        top5EscolasRanking() {
          return (this.ranking.escolasPorCobertura || []).slice(0, 5);
        },

        top5UnidadesRanking() {
          return (this.ranking.unidadesPorCobertura || []).slice(0, 5);
        },

        top5PendenciasRanking() {
          return (this.ranking.unidadesMaiorPendencia || []).slice(0, 5);
        },

        rankingTotalEscolas() {
          return (this.ranking.escolasPorCobertura || []).length;
        },

        rankingEscolaUsuarioNome() {
          const direta = String(this.sessionInfo?.escola || "").trim();
          if (direta) return direta;
          const lista = this.sessionInfo?.escolasPermitidas || [];
          return lista.length ? String(lista[0] || "").trim() : "";
        },

        rankingEscolasComPosicao() {
          const alvo = this.normalizarComparacao(this.rankingEscolaUsuarioNome);
          return (this.ranking.escolasPorCobertura || []).map((item, index) => {
            const nome = String(item.nome || "").trim();
            return Object.assign({}, item, {
              posicao: index + 1,
              ehMinhaEscola: alvo && this.normalizarComparacao(nome) === alvo
            });
          });
        },

        minhaEscolaRanking() {
          if (this.isGestor) return this.rankingEscolasComPosicao[0] || null;
          return this.rankingEscolasComPosicao.find(item => item.ehMinhaEscola) || null;
        },

        naoElegiveisMinhaEscola() {
          const item = this.minhaEscolaRanking;
          if (!item) return 0;
          const total = Number(item.total || item.totalAlunos || 0);
          const vacinados = Number(item.vacinados || 0);
          const atrasos = Number(item.atrasos || 0);
          return Math.max(0, total - vacinados - atrasos);
        },

        rankingMediaMunicipal() {
          const lista = this.ranking.escolasPorCobertura || [];
          const elegiveis = lista.reduce((acc, item) => acc + Number(item.elegiveis || 0), 0);
          const vacinados = lista.reduce((acc, item) => acc + Number(item.vacinados || 0), 0);
          return elegiveis ? Number(((vacinados / elegiveis) * 100).toFixed(1)) : 0;
        },

        rankingDiferencaMedia() {
          const cobertura = this.minhaEscolaRanking ? Number(this.minhaEscolaRanking.cobertura || 0) : 0;
          return Number((cobertura - Number(this.rankingMediaMunicipal || 0)).toFixed(1));
        },

        rankingComparacaoMediaTexto() {
          if (!this.minhaEscolaRanking) return "-";
          const diff = Math.abs(Number(this.rankingDiferencaMedia || 0)).toFixed(1).replace(".", ",");
          if (Number(this.rankingDiferencaMedia || 0) === 0) return "Igual à média";
          return Number(this.rankingDiferencaMedia || 0) > 0
            ? diff + "% acima"
            : diff + "% abaixo";
        },

        rankingHistoricoTemDados() {
          return Array.isArray(this.rankingHistorico?.labels) && this.rankingHistorico.labels.length > 0 &&
            Array.isArray(this.rankingHistorico?.values) && this.rankingHistorico.values.some(v => v !== null && v !== undefined && v !== "");
        },

        rankingEscolasDestaque() {
          const lista = this.rankingEscolasComPosicao || [];
          const minha = this.minhaEscolaRanking;
          const mapa = new Map();

          lista.slice(0, 5).forEach(item => mapa.set(item.posicao, item));
          if (minha) {
            const pos = Number(minha.posicao || 0);
            [pos - 1, pos, pos + 1].forEach(p => {
              const item = lista.find(x => Number(x.posicao) === p);
              if (item) mapa.set(item.posicao, item);
            });
          }

          return Array.from(mapa.values()).sort((a, b) => Number(a.posicao || 0) - Number(b.posicao || 0)).slice(0, 7);
        },

        rankingMensagemLeitura() {
          const minha = this.minhaEscolaRanking;
          if (!minha) return "Assim que a escola for identificada, o sistema mostrará a leitura da cobertura.";
          const cobertura = Number(minha.cobertura || 0);
          if (cobertura >= 95) return "Sua escola está dentro da meta recomendada. Mantenha o acompanhamento para não perder desempenho.";
          if (cobertura >= 85) return "Sua escola está em atenção. Poucos alunos atualizados podem aproximar a cobertura da meta de 95%.";
          return "Sua escola está em faixa crítica. Priorize a busca ativa dos alunos em atraso e revise registros sem informação.";
        },

        totalSemInformacaoVacinal() {
          const s = this.vacinal?.graficos?.situacaoVacinalCompleta || {};
          return (s.semInfo || []).reduce((acc, v) => acc + Number(v || 0), 0);
        },

        totalEscolasFiltro() {
          const escolas = new Set();
          (this.vacinal?.tabela || []).forEach(item => {
            if (item.escola) escolas.add(item.escola);
          });
          if (escolas.size) return escolas.size;
          return this.vacinal?.form?.escola ? 1 : 0;
        },

        vacinalEscolaLabel() {
          return this.vacinal.form.escola || "-";
        },

        vacinalSegmentoLabel() {
          return this.vacinal.form.segmento === "TODOS" ? "Todos" : this.vacinal.form.segmento;
        },

        vacinalTurmaLabel() {
          return this.vacinal.form.turma === "TODAS" ? "Todas" : this.vacinal.form.turma;
        },

        vacinalVacinaLabel() {
          return this.vacinal.form.vacina === "TODAS" ? "Todas" : this.vacinal.form.vacina;
        },

        cadastralEscolaLabel() {
          return this.cadastral.form.escola === "TODAS" ? "Todas" : this.cadastral.form.escola;
        },

        cadastralTurmaLabel() {
          return this.cadastral.form.turma === "TODAS" ? "Todas" : this.cadastral.form.turma;
        },

        vacinalVacinasDisponiveis() {
          const mapa = new Map();
          (this.vacinal.tabela || []).forEach(item => {
            const texto = String(item.vacinasAtraso || "").trim();
            if (!texto) return;
            texto.split(",").map(v => v.trim()).filter(Boolean).forEach(v => {
              const chave = this.normalizeText(v);
              if (chave && !mapa.has(chave)) mapa.set(chave, v);
            });
          });
          return Array.from(mapa.values()).sort((a, b) => a.localeCompare(b, "pt-BR"));
        },

        vacinalSortedFiltered() {
          let lista = this.getSortedFilteredList(
            this.vacinal.tabela,
            this.vacinal.busca,
            this.vacinal.sort.key,
            this.vacinal.sort.dir
          );

          if (this.vacinal.form.vacinaAtraso && this.vacinal.form.vacinaAtraso !== "TODAS") {
            const vacinaFiltro = this.normalizeText(this.vacinal.form.vacinaAtraso);
            lista = lista.filter(item => {
              const vacinas = String(item.vacinasAtraso || "")
                .split(",")
                .map(v => this.normalizeText(v))
                .filter(Boolean);
              return vacinas.includes(vacinaFiltro);
            });
          }

          return lista;
        },

        cadastralSortedFiltered() {
          return this.getSortedFilteredList(
            this.cadastral.tabela,
            this.cadastral.busca,
            this.cadastral.sort.key,
            this.cadastral.sort.dir
          );
        },

        vacinalTotalPages() {
          return Math.max(1, Math.ceil(this.vacinalSortedFiltered.length / this.vacinal.pagination.perPage));
        },

        cadastralTotalPages() {
          return Math.max(1, Math.ceil(this.cadastralSortedFiltered.length / this.cadastral.pagination.perPage));
        },

        vacinalPageItems() {
          return this.getPageItems(this.vacinalSortedFiltered, this.vacinal.pagination);
        },

        cadastralPageItems() {
          return this.getPageItems(this.cadastralSortedFiltered, this.cadastral.pagination);
        },

        vacinalPageStart() {
          if (!this.vacinalSortedFiltered.length) return 0;
          return (this.vacinal.pagination.page - 1) * this.vacinal.pagination.perPage + 1;
        },

        vacinalPageEnd() {
          return Math.min(
            this.vacinal.pagination.page * this.vacinal.pagination.perPage,
            this.vacinalSortedFiltered.length
          );
        },

        cadastralPageStart() {
          if (!this.cadastralSortedFiltered.length) return 0;
          return (this.cadastral.pagination.page - 1) * this.cadastral.pagination.perPage + 1;
        },

        cadastralPageEnd() {
          return Math.min(
            this.cadastral.pagination.page * this.cadastral.pagination.perPage,
            this.cadastralSortedFiltered.length
          );
        },

        vacinalVisiblePages() {
          return this.getVisiblePages(this.vacinal.pagination.page, this.vacinalTotalPages);
        },

        cadastralVisiblePages() {
          return this.getVisiblePages(this.cadastral.pagination.page, this.cadastralTotalPages);
        },

        vacinalPagination() {
          return this.vacinal.pagination;
        },

        cadastralPagination() {
          return this.cadastral.pagination;
        }
      },

      watch: {
        'vacinal.busca'() {
          this.vacinal.pagination.page = 1;
        },
        'cadastral.busca'() {

      methods: {

        vacinasAtrasoFormatadasInline(item) {
          const texto = String(
            (item && (item.vacinasAtraso || item.principaisPendencias || item.pendenciasVacinais)) || ""
          ).trim();

          if (!texto) return "-";

          return texto
            .split(/,|;|\n|\+/)
            .map(function(v) { return String(v || "").trim(); })
            .filter(function(v) { return v && !/^\d+\s*pend/i.test(v); })
            .join(" • ");
        },


        abrirModalAluno(item) {
          this.vacinal.modalAluno = item || null;
          this.vacinal.alunoSelecionado = null;
        },

        fecharModalAlunoVacinal() {
          this.vacinal.modalAluno = null;
        },

        selecionarAlunoVacinal(item) {
          this.vacinal.alunoSelecionado = (this.vacinal.alunoSelecionado === item) ? null : (item || null);
        },

        obterAlunoSelecionadoVacinal() {
          return this.vacinal.alunoSelecionado || null;
        },

        vacinalPercentual(valor) {
          const total = Number(this.vacinal?.indicadores?.totalAlunos || 0);
          if (!total) return '0';
          return ((Number(valor || 0) / total) * 100).toFixed(1).replace('.', ',');
        },


        turmaResumidaVacinal(turma) {
          const texto = String(turma || '').trim();
          if (!texto) return '-';
          let t = texto
            .replace(/ENSINO FUNDAMENTAL/gi, '')
            .replace(/REGULAR/gi, '')
            .replace(/\|/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();

          const ano = (t.match(/\d+º\s*ANO/i) || t.match(/\d+o\s*ANO/i) || [''])[0].toUpperCase();
          const turno = /INTEGRAL/i.test(t) ? 'INTEGRAL' : (/MANH[ÃA]/i.test(t) ? 'MANHÃ' : (/TARDE/i.test(t) ? 'TARDE' : ''));
          const letra = (t.match(/-\s*([A-Z])\b/i) || t.match(/\b([A-Z])$/i) || [null, ''])[1];

          const partes = [ano, turno, letra].filter(Boolean);
          return partes.length ? partes.join(' • ') : (texto.length > 38 ? texto.slice(0, 38) + '…' : texto);
        },

        primeiraPendenciaVacinal(item) {
          const partes = String(item?.vacinasAtraso || "").split(",").map(x => x.trim()).filter(Boolean);
          return partes.length ? partes[0] : "-";
        },

        demaisPendenciasVacinal(item) {
          const partes = String(item?.vacinasAtraso || "").split(",").map(x => x.trim()).filter(Boolean);
          return partes.length > 1 ? "+ " + (partes.length - 1) + " pendência(s)" : "";
        },

        vacinalPrincipalPendencia() {
          const mapa = {};
          const fonte = Array.isArray(this.vacinalSortedFiltered) && this.vacinalSortedFiltered.length
            ? this.vacinalSortedFiltered
            : (Array.isArray(this.vacinal?.tabela) ? this.vacinal.tabela : []);

          fonte.forEach(item => {
            String(item?.vacinasAtraso || "")
              .split(",")
              .map(x => x.trim())
              .filter(Boolean)
              .forEach(v => {
                mapa[v] = (mapa[v] || 0) + 1;
              });
          });

          const ordenado = Object.keys(mapa).sort((a,b) => mapa[b] - mapa[a]);
          return ordenado.length ? ordenado[0] : "Sem pendência";
        },

        vacinalFaltamMetaEstimado() {
          const total = Number(this.vacinal?.indicadores?.totalAlunos || 0);
          const emDia = Number(this.vacinalEmDiaEstimado() || 0);
          if (!total) return 0;
          return Math.max(0, Math.ceil(total * 0.95) - emDia);
        },

        vacinalStatusCurto(situacao) {
          const s = this.normalizeText(String(situacao || ""));
          if (s === "SIM") return "Em dia";
          if (s === "NAO" || s === "NÃO") return "Pendente";
          if (s.indexOf("NAO TEM IDADE") !== -1 || s.indexOf("NÃO TEM IDADE") !== -1) return "Não elegível";
          if (!s || s === "EM BRANCO") return "Sem info";
          return situacao || "Sem info";
        },

        vacinalEmDiaEstimado() {
          const total = Number(this.vacinal?.indicadores?.totalAlunos || 0);
          const atraso = Number(this.vacinal?.indicadores?.alunosEmAtraso || 0);
          const naoEleg = this.vacinalNaoElegiveisEstimado();
          return Math.max(0, total - atraso - naoEleg);
        },

        vacinalNaoVacinadosEstimado() {
          const s = this.vacinal?.graficos?.situacaoVacinalCompleta || {};
          return (s.naoVacinados || []).reduce((acc, v) => acc + Number(v || 0), 0);
        },

        vacinalNaoElegiveisEstimado() {
          const lista = this.vacinal?.tabela || [];
          let total = 0;
          lista.forEach(item => {
            const flags = item.coberturaFlags || {};
            Object.keys(flags).forEach(k => {
              if (flags[k] && flags[k].foraIdade) total++;
            });
          });
          return total;
        },

        vacinalTabelaVacinasAluno(item) {
          if (!item) return [];
          const flags = item.coberturaFlags || {};
          const nomesAtraso = String(item.vacinasAtraso || '').split(',').map(v => this.normalizeText(v)).filter(Boolean);
          const nomesElegiveis = Array.isArray(item.vacinasElegiveis) ? item.vacinasElegiveis : [];
          const mapaLabels = {};
          [...nomesElegiveis, ...String(item.vacinasAtraso || '').split(',')].forEach(v => {
            const nome = String(v || '').trim();
            if (nome) mapaLabels[this.normalizeText(nome)] = nome;
          });

          const porFlags = Object.keys(flags).map(key => {
            const f = flags[key] || {};
            let nome = mapaLabels[this.normalizeText(key)] || String(key || '').toUpperCase();
            Object.keys(mapaLabels).forEach(k => {
              if (k.indexOf(this.normalizeText(key)) !== -1 || this.normalizeText(key).indexOf(k) !== -1) nome = mapaLabels[k];
            });
            let situacao = 'Em branco';
            let interpretacao = 'Sem informação';
            if (f.foraIdade) { situacao = 'NÃO TEM IDADE'; interpretacao = 'Fora da faixa etária'; }
            else if (f.tomou) { situacao = 'SIM'; interpretacao = 'Em dia'; }
            else if (f.semInfo) { situacao = 'Em branco'; interpretacao = 'Sem informação'; }
            else if (f.emAtraso || nomesAtraso.includes(this.normalizeText(nome))) { situacao = 'NÃO'; interpretacao = 'Pendente'; }
            return { nome, situacao, interpretacao };
          });

          if (porFlags.length) return porFlags;

          return String(item.vacinasAtraso || '').split(',').map(v => v.trim()).filter(Boolean).map(v => ({
            nome: v,
            situacao: 'NÃO',
            interpretacao: 'Pendente'
          }));
        },

        situacaoBadgeClasse(situacao) {
          const s = this.normalizeText(situacao || '');
          if (s === 'SIM') return 'ok';
          if (s.indexOf('NAO TEM IDADE') !== -1 || s.indexOf('NÃO TEM IDADE') !== -1) return 'fora';
          if (s.indexOf('BRANCO') !== -1) return 'branco';
          return 'pendente';
        },




        irPaginaCadastral(pagina) {
          const total = this.cadastralTotalPaginas || 1;
          this.cadastralNovo.pagina = Math.min(Math.max(1, Number(pagina || 1)), total);
        },

        mudarPorPaginaCadastral() {
          this.cadastralNovo.pagina = 1;
        },

        ordenarCadastralPor(campo, vindoDoSelect) {
          if (!this.cadastralNovo.ordenacao) {
            this.cadastralNovo.ordenacao = { campo: "turmaNome", direcao: "asc" };
          }

          if (!vindoDoSelect && this.cadastralNovo.ordenacao.campo === campo) {
            this.cadastralNovo.ordenacao.direcao = this.cadastralNovo.ordenacao.direcao === "asc" ? "desc" : "asc";
          } else {
            this.cadastralNovo.ordenacao.campo = campo || "turmaNome";
            this.cadastralNovo.ordenacao.direcao = "asc";
          }

          this.cadastralNovo.pagina = 1;
        },

        indicadorOrdenacaoCadastral(campo) {
          const ord = this.cadastralNovo.ordenacao || { campo: "turmaNome", direcao: "asc" };
          if (ord.campo !== campo) return "↕";
          return ord.direcao === "asc" ? "A→Z" : "Z→A";
        },

        labelOrdenacaoCadastral() {
          const ord = this.cadastralNovo.ordenacao || { campo: "turmaNome", direcao: "asc" };
          const nomes = {
            turmaNome: "Turma + Nome do aluno",
            turma: "Turma",
            nome: "Nome do aluno",
            matricula: "MAT.",
            cpf: "CPF",
            situacao: "Situação"
          };
          const direcao = ord.direcao === "desc" ? "Z→A" : "A→Z";
          return (nomes[ord.campo] || "Turma + Nome do aluno") + " (" + direcao + ")";
        },

        valorOrdenacaoCadastral(item, campo) {
          if (!item) return "";
          if (campo === "turmaNome") return String(item.turma || "") + " " + String(item.nome || "");
          if (campo === "matricula") return String(item.matricula || "").replace(/\D/g, "").padStart(20, "0") || String(item.matricula || "");
          if (campo === "nome") return String(item.nome || "");
          if (campo === "turma") return String(item.turma || "");
          if (campo === "cpf") return String(item.cpfMascarado || item.cpf || item.cpfNovo || "");
          if (campo === "situacao") return item.semCpf ? "Sem CPF" : "CPF atualizado";
          return String(item.nome || "");
        },

        aplicarOrdenacaoCadastral(lista) {
          const ord = this.cadastralNovo.ordenacao || { campo: "turmaNome", direcao: "asc" };
          const campo = ord.campo || "turmaNome";
          const direcao = ord.direcao === "desc" ? -1 : 1;
          return (lista || []).slice().sort((a, b) => {
            const va = this.normalizeForSort(this.valorOrdenacaoCadastral(a, campo));
            const vb = this.normalizeForSort(this.valorOrdenacaoCadastral(b, campo));
            if (va < vb) return -1 * direcao;
            if (va > vb) return 1 * direcao;

            const na = this.normalizeForSort(String(a.nome || ""));
            const nb = this.normalizeForSort(String(b.nome || ""));
            if (na < nb) return -1;
            if (na > nb) return 1;
            return 0;
          });
        },

        prioridadeClasseCad(prioridade) {
          const p = String(prioridade || "").toUpperCase();
          if (p === "ALTA") return "red";
          if (p === "MÉDIA" || p === "MEDIA") return "orange";
          return "blue";
        },

        tipoClasseCad(tipo) {
          const t = String(tipo || "").toUpperCase();
          if (t.indexOf("CPF") !== -1 && t.indexOf("ENDERE") !== -1) return "red";
          if (t.indexOf("CPF") !== -1) return "red";
          if (t.indexOf("ENDERE") !== -1) return "orange";
          return "purple";
        },

        resumirTurmaCadastral(turma) {
          const txt = String(turma || "-").trim();
          if (!txt || txt === "-") return "-";
          let t = txt
            .replace(/\s*\|\s*/g, " • ")
            .replace(/ENSINO FUNDAMENTAL/gi, "")
            .replace(/EDUCAÇÃO INFANTIL/gi, "ED. INF.")
            .replace(/EDUCACAO INFANTIL/gi, "ED. INF.")
            .replace(/REGULAR/gi, "")
            .replace(/INTEGRAL \(45H\)/gi, "INT")
            .replace(/INTEGRAL \(40H\)/gi, "INT")
            .replace(/INTEGRAL/gi, "INT")
            .replace(/\s+•\s+•\s+/g, " • ")
            .replace(/^\s*•\s*|\s*•\s*$/g, "")
            .replace(/\s{2,}/g, " ")
            .trim();
          return t.length > 38 ? t.slice(0, 37) + "…" : t;
        },

        resumirEscolaCadastral(escola) {
          const txt = String(escola || "").trim();
          if (!txt) return "";
          return txt.replace(/ESCOLA DE ENSINO FUNDAMENTAL/gi, "ESCOLA").replace(/ENSINO FUNDAMENTAL/gi, "").replace(/\s{2,}/g, " ").trim();
        },

        percentualBarraCadastral(total) {
          const lista = this.cadastralNovo.topTurmas || [];
          const max = Math.max(1, ...lista.map(x => Number(x.total || 0)));
          return Math.min(100, Math.max(4, (Number(total || 0) / max) * 100));
        },

        maskCpfCadastral(value) {
          const n = this.onlyNumbers(value).slice(0, 11);
          if (n.length <= 3) return n;
          if (n.length <= 6) return n.replace(/(\d{3})(\d+)/, "$1.$2");
          if (n.length <= 9) return n.replace(/(\d{3})(\d{3})(\d+)/, "$1.$2.$3");
          return n.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, "$1.$2.$3-$4");
        },

        async salvarCpfCadastral(item) {
          this.clearTopMessages();

          if (!item || !item.matricula) {
            this.topError = "Não é seguro salvar sem MAT. do aluno.";
            return;
          }

          const cpfNumeros = this.onlyNumbers(item.cpfNovo);
          if (cpfNumeros.length !== 11) {
            this.topError = "Informe um CPF com 11 dígitos.";
            return;
          }

          item.cpfSalvando = true;
          try {
            const res = await this.gas("salvarCpfAlunoCadastral", this.sessionToken, {
              base: item.base,
              escola: item.escola,
              matricula: item.matricula,
              nome: item.nome,
              cpfNovo: item.cpfNovo
            });

            item.cpf = res?.cpfMascarado || "CPF atualizado";
            item.cpfMascarado = res?.cpfMascarado || "";
            item.cpfNovo = "";
            item.semCpf = false;
            item.podeEditarCpf = false;
            item.cpfSalvo = true;
            item.cpfSalvando = false;
            item.horaSalvo = new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
            item.motivoBloqueioCpf = "CPF atualizado. A edição foi bloqueada.";

            this.cadCpfFeedback.visible = true;
            this.cadCpfFeedback.mensagem = "CPF atualizado com sucesso!";
            this.topSuccess = "";

            const chave = [item.base, item.escola, item.matricula].map(v => String(v || '').toUpperCase()).join('|');
            window.setTimeout(() => {
              this.cadastralNovo.lista = (this.cadastralNovo.lista || []).filter(x => {
                const k = [x.base, x.escola, x.matricula].map(v => String(v || '').toUpperCase()).join('|');
                return k !== chave;
              });
              if (this.cadastralNovo.resumo) {

                this.cadastralNovo.resumo.totalInconsistencias = Math.max(0, Number(this.cadastralNovo.resumo.totalInconsistencias || 0) - 1);
              }
              if (this.cadastralNovo.pagina > this.cadastralTotalPaginas) this.cadastralNovo.pagina = this.cadastralTotalPaginas;
            }, 4500);
          } catch (err) {
            this.handleError(err);
          } finally {
            if (item) item.cpfSalvando = false;
          }

        gas(method, ...args) {
          return new Promise((resolve, reject) => {
            google.script.run
              .withSuccessHandler(resolve)
              .withFailureHandler(reject)[method](...args);
          });
        },

        onlyNumbers(value) {

        normalizeText(value) {
          return String(value || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toLowerCase()
            .trim();
        },

        normalizeForSort(value) {
          if (value === null || value === undefined) return "";
          const text = String(value).trim();
          const number = Number(String(value).replace(",", "."));
          if (!Number.isNaN(number) && text !== "") return number;
          return this.normalizeText(text);
        },

          this.topError = "";

        async fazerLogin() {
          this.resetAuthMessages();
          this.clearTopMessages();

          const perfil = this.loginForm.perfil;
          const usuario = String(this.loginForm.usuario || "").trim();
          const senha = String(this.loginForm.senha || "").trim();

          this.loginForm.usuario = usuario;
          this.loading = true;

          try {
            const res = await this.gas("validarLogin", perfil, usuario, senha);

            if (!res.ok) {
              this.loginMsg = res.mensagem || "Erro no login.";
              return;
            }

            this.sessionToken = res.token;
            this.sessionInfo = res;

            if (this.lembrarUsuario) {
              localStorage.setItem("simve_usuario", usuario);
              localStorage.setItem("simve_perfil", perfil);
            } else {
              localStorage.removeItem("simve_usuario");
              localStorage.removeItem("simve_perfil");
            }

            if (res.primeiroAcesso) {
              this.authView = "primeiroAcesso";
              return;
            }

            this.configurarFiltrosPorPerfil();
            if (String(res.perfil || "").toUpperCase() === "EDUCACAO") {
              const inicioAplicado = await this.aplicarInicioEscolaDoLogin(res.inicioEscola);
              if (!inicioAplicado) await this.inicializarInicioEscolaAposLogin();
            } else {
              this.currentView = "inicio";
              await this.carregarInicioPerfil();
            }
          } catch (err) {
            this.loginMsg = err?.message || "Erro no login.";
          } finally {
            this.loading = false;
          }
        },

        async salvarPrimeiroAcesso() {
          this.primeiroMsg = "";
          this.clearTopMessages();
          this.loading = true;

          try {
            await this.gas(
              "redefinirSenhaPrimeiroAcesso",
              this.sessionToken,
              this.primeiroAcessoForm.senha1,
              this.primeiroAcessoForm.senha2
            );

            if (this.sessionInfo) {
              this.sessionInfo.primeiroAcesso = false;
            }

            this.primeiroAcessoForm = { senha1: "", senha2: "" };
            this.configurarFiltrosPorPerfil();
            if (String(this.sessionInfo?.perfil || "").toUpperCase() === "EDUCACAO") {
              const inicioAplicado = await this.aplicarInicioEscolaDoLogin(this.sessionInfo?.inicioEscola);
              if (!inicioAplicado) await this.inicializarInicioEscolaAposLogin();
            } else {
              this.currentView = "inicio";
              await this.carregarInicioPerfil();
            }
            this.topSuccess = "Senha atualizada com sucesso.";
          } catch (err) {
            this.primeiroMsg = err?.message || "Erro ao redefinir senha.";
          } finally {
            this.loading = false;
          }
        },

        async solicitarRecuperacao() {
          this.recMsg = "";
          this.recMsgOk = "";
          this.clearTopMessages();

          const perfil = this.recuperacaoForm.perfil;
          const usuario = String(this.recuperacaoForm.usuario || "").trim();
          this.recuperacaoForm.usuario = usuario;

          this.loading = true;

          try {
            const res = await this.gas("solicitarRecuperacaoSenha", perfil, usuario);

            if (!res.ok) {
              this.recMsg = res.mensagem || "Erro na recuperação.";
              return;
            }

            this.recMsgOk = res.mensagem || "Código enviado.";
            this.codigoForm.perfil = perfil;
            this.codigoForm.usuario = usuario;
            this.authView = "codigo";
          } catch (err) {
            this.recMsg = err?.message || "Erro na recuperação.";
          } finally {
            this.loading = false;
          }
        },

        async confirmarRecuperacao() {
          this.codigoMsg = "";
          this.clearTopMessages();

          this.codigoForm.usuario = this.onlyNumbers(this.codigoForm.usuario);
          this.codigoForm.codigo = this.onlyNumbers(this.codigoForm.codigo);

          this.loading = true;

          try {
            const res = await this.gas(
              "redefinirSenhaPorCodigo",
              this.codigoForm.perfil,
              this.codigoForm.usuario,
              this.codigoForm.codigo,
              this.codigoForm.senha1,
              this.codigoForm.senha2
            );

            if (!res.ok) {
              this.codigoMsg = res.mensagem || "Erro ao redefinir senha.";
              return;
            }

            this.topSuccess = "Senha redefinida com sucesso. Faça login novamente.";
            this.authView = "login";

            this.codigoForm = {
              perfil: "",
              usuario: "",
              codigo: "",
              senha1: "",
              senha2: ""
            };
          } catch (err) {
            this.codigoMsg = err?.message || "Erro ao redefinir senha.";
          } finally {
            this.loading = false;
          }
        },

        configurarFiltrosPorPerfil() {
          if (!this.sessionInfo) return;

          if (this.sessionInfo.perfil === "EDUCACAO") {
            this.vacinal.form.base = this.sessionInfo.base;
            this.cadastral.form.base = this.sessionInfo.base;
          }
        },

        async carregarResumoInicial() {
          this.clearTopMessages();

          const baseInicial = this.sessionInfo?.perfil === "EDUCACAO"
            ? this.sessionInfo.base
            : "ESCOLAR";

          this.suppressWatchers = true;

          this.vacinal.form.escola = "";
          this.vacinal.form.segmento = "TODOS";
          this.vacinal.form.turma = "TODAS";
          this.vacinal.form.vacina = "TODAS";
          this.vacinal.form.vacinaAtraso = "TODAS";
          this.vacinal.form.vacinaEvolucao = "TODAS";
          this.vacinal.busca = "";
          this.vacinal.pagination.page = 1;

          this.cadastral.form.base = baseInicial;
          this.cadastral.form.escola = "TODAS";
          this.cadastral.form.turma = "TODAS";
          this.cadastral.busca = "";
          this.cadastral.pagination.page = 1;

          const [vacinalData, cadastralData] = await Promise.all([
            this.gas("getDashboardData", this.sessionToken, baseInicial, "TODAS", "TODAS"),
            this.gas("getSituacaoCadastral", this.sessionToken, this.cadastral.form.base, this.cadastral.form.escola, this.cadastral.form.turma)
          ]);

          vacinalData.historico = { labels: [], values: [], titulo: "Evolução mensal da cobertura vacinal" };
          this.aplicarDadosVacinal(vacinalData, false);
          this.aplicarDadosCadastral(cadastralData, false);

          this.homeResumo = {
            base: baseInicial,
            totalAlunos: vacinalData?.indicadores?.totalAlunos || 0,
            alunosEmAtraso: vacinalData?.indicadores?.alunosEmAtraso || 0,
            coberturaGeral: vacinalData?.indicadores?.coberturaGeral || 0,
            inconsistencias: (cadastralData?.tabela || []).length,
            alunosSemCpf: cadastralData?.indicadores?.alunosSemCpf || 0,
            alunosSemEndereco: cadastralData?.indicadores?.alunosSemEndereco || 0
          };

          this.suppressWatchers = false;
        },

        async recarregarResumoInicial() {
          this.loading = true;
          try {
            await this.carregarInicioPerfil();
            this.topSuccess = "Resumo inicial atualizado com sucesso.";
          } catch (err) {
            this.handleError(err);
          } finally {
            this.loading = false;
          }
        },

        async setView(view) {
          this.clearTopMessages();
          this.currentView = view;

          if (view === "inicio") {
            if (!this.isGestor) {
              this.currentView = "ranking";
              await this.carregarRanking();
              return;
            }
            await this.carregarInicioPerfil();
          }

          if (view === "cadastral") {
            await this.carregarCadastralNovo();
          }

          if (view === "vacinal") {
            await this.carregarEscolasVacinal();
            await this.carregarVacinal();
          }

          if (view === "ranking") {
            await this.carregarRanking();
          }

          if (view === "acessos") {
            if (!this.isAdmin) {
              this.topError = "Acesso restrito ao perfil ADM.";
              this.currentView = this.isGestor ? "inicio" : "ranking";
              return;
            }
            await this.carregarMonitoramentoAcessos();
          }

          if (view === "admin") {
            if (!this.isAdmin) {
              this.topError = "Acesso restrito ao perfil ADM.";
              this.currentView = this.isGestor ? "inicio" : "ranking";
              return;
            }
            await this.carregarStatusGatilho();
          }

          if (view === "cadastral") {
            await this.carregarCadastral();
          }

          if (view === "documentos") {
            await this.carregarDocumentos();
          }
        },

        async carregarEscolasVacinal() {
          const lista = await this.gas("getEscolasPainelVacinal", this.sessionToken);
          this.vacinal.filtros.escolas = Array.isArray(lista) ? lista.map(x => x.nome) : [];
          this.vacinal._metaEscolas = Array.isArray(lista) ? lista : [];

          if (!this.vacinal.form.escola && this.vacinal.filtros.escolas.length) {
            this.vacinal.form.escola = this.vacinal.filtros.escolas[0];
          }

          const meta = (this.vacinal._metaEscolas || []).find(x => x.nome === this.vacinal.form.escola);
          this.vacinal.filtros.segmentosDisponiveis = meta
            ? [
                ...(meta.infantil && meta.escolar ? ["TODOS"] : []),
                ...(meta.infantil ? ["INFANTIL"] : []),
                ...(meta.escolar ? ["ESCOLAR"] : [])
              ]
            : ["TODOS"];

          if (!this.vacinal.filtros.segmentosDisponiveis.includes(this.vacinal.form.segmento)) {
            this.vacinal.form.segmento = this.vacinal.filtros.segmentosDisponiveis[0] || "TODOS";
          }
        },

        limparFiltrosVacinal() {
          this.suppressWatchers = true;
          this.vacinal.form.segmento = "TODOS";
          this.vacinal.form.turma = "TODAS";
          this.vacinal.form.vacina = "TODAS";
          this.vacinal.form.vacinaAtraso = "TODAS";
          this.vacinal.form.vacinaEvolucao = "TODAS";
          this.vacinal.busca = "";
          this.vacinal.pagination.page = 1;
          this.suppressWatchers = false;
          this.carregarVacinal();
        },

        limparFiltrosCadastral() {
          this.suppressWatchers = true;
          this.cadastral.form.escola = "TODAS";
          this.cadastral.form.turma = "TODAS";
          this.cadastral.busca = "";
          this.cadastral.pagination.page = 1;
          this.suppressWatchers = false;
          this.carregarCadastral();
        },


        async carregarHistoricoEvolucao() {
          if (!this.vacinal.form.escola) return;

          try {
            const historico = await this.gas(
              "getHistoricoCobertura",
              this.sessionToken,
              this.vacinal.form.escola,
              this.vacinal.form.segmento,
              this.vacinal.form.turma,
              this.vacinal.form.vacinaEvolucao
            );

            this.vacinal.historico = historico || {
              labels: [],
              values: [],
              datasets: [],
              titulo: "Evolução mensal da cobertura vacinal",
              inicioSerie: "Abril"
            };

            await nextTick();
            this.renderVacCharts();
          } catch (err) {
            this.handleError(err);
          }
        },

        async carregarVacinal() {
          this.clearTopMessages();
          this.loading = true;

          try {
            if (!this.vacinal.filtros.escolas.length) {
              await this.carregarEscolasVacinal();
            } else {
              const meta = (this.vacinal._metaEscolas || []).find(x => x.nome === this.vacinal.form.escola);
              this.vacinal.filtros.segmentosDisponiveis = meta
                ? [
                    ...(meta.infantil && meta.escolar ? ["TODOS"] : []),
                    ...(meta.infantil ? ["INFANTIL"] : []),
                    ...(meta.escolar ? ["ESCOLAR"] : [])
                  ]
                : ["TODOS"];
              if (!this.vacinal.filtros.segmentosDisponiveis.includes(this.vacinal.form.segmento)) {
                this.vacinal.form.segmento = this.vacinal.filtros.segmentosDisponiveis[0] || "TODOS";
              }
            }

            if (!this.vacinal.form.escola) return;

            const [data, historico] = await Promise.all([
              this.gas(
                "getPainelVacinalPorEscola",
                this.sessionToken,
                this.vacinal.form.escola,
                this.vacinal.form.segmento,
                this.vacinal.form.turma,
                "TODAS"
              ),
              this.gas(
                "getHistoricoCobertura",
                this.sessionToken,
                this.vacinal.form.escola,
                this.vacinal.form.segmento,
                this.vacinal.form.turma,
                this.vacinal.form.vacinaEvolucao
              )
            ]);

            data.historico = historico || { labels: [], values: [], titulo: "Evolução mensal da cobertura vacinal" };
            await this.aplicarDadosVacinal(data, true);
          } catch (err) {
            this.handleError(err);
          } finally {
            this.loading = false;
          }
        },

        async aplicarDadosVacinal(data, renderCharts = true) {
          this.vacinal.indicadores = data?.indicadores || {
            totalAlunos: 0,
            alunosEmAtraso: 0,
            coberturaGeral: 0,
            escolasAbaixo80: []
          };

          this.vacinal.graficos = data?.graficos || {
            atrasoPorEscola: { labels: [], values: [] },
            atrasoPorTurma: { labels: [], values: [] },
            coberturaVacinas: { labels: [], values: [] },
            coberturaVacinasInfantil: { labels: [], values: [] },
            coberturaVacinasEscolar: { labels: [], values: [] }
          };

          this.vacinal.historico = data?.historico || {
            labels: [],
            values: [],
            datasets: [],
            titulo: "Evolução mensal da cobertura vacinal",
            inicioSerie: "Abril"
          };

          this.vacinal.tabela = data?.tabela || [];
          this.vacinal.atualizadoEm = data?.atualizadoEm || "";

          this.vacinal.acesso = data?.acesso || {
            escolaTravada: false,
            escolasPermitidas: []
          };

          this.vacinal.resumoSegmentos = data?.resumoSegmentos || {
            infantil: { disponivel: false, totalAlunos: 0, alunosEmAtraso: 0, coberturaGeral: 0 },
            escolar: { disponivel: false, totalAlunos: 0, alunosEmAtraso: 0, coberturaGeral: 0 }
          };
          this.vacinal.diagnostico = data?.diagnostico || {};

          const escolas = data?.filtros?.escolas || [];
          const turmas = data?.filtros?.turmas || [];
          const segmentosDisponiveis = data?.filtros?.segmentosDisponiveis || ["TODOS"];
          const vacinas = data?.filtros?.vacinasDisponiveis || [];
          const vacinasCobertura = data?.filtros?.vacinasCoberturaDisponiveis || vacinas;
          const vacinasAtraso = data?.filtros?.vacinasAtrasoDisponiveis || this.vacinalVacinasDisponiveis;

          this.vacinal.filtros.escolas = escolas;
          this.vacinal.filtros.turmas = turmas;
          this.vacinal.filtros.segmentosDisponiveis = segmentosDisponiveis;
          this.vacinal.filtros.vacinas = vacinas;
          this.vacinal.filtros.vacinasCobertura = vacinasCobertura;
          this.vacinal.filtros.vacinasAtraso = vacinasAtraso;

          this.suppressWatchers = true;

          if (this.vacinal.form.escola && !escolas.includes(this.vacinal.form.escola)) {
            this.vacinal.form.escola = escolas[0] || "";
          }

          if (this.vacinal.form.turma !== "TODAS" && !turmas.includes(this.vacinal.form.turma)) {
            this.vacinal.form.turma = "TODAS";
          }

          if (!segmentosDisponiveis.includes(this.vacinal.form.segmento)) {
            this.vacinal.form.segmento = segmentosDisponiveis[0] || "TODOS";
          }

          if (this.vacinal.form.vacinaEvolucao !== "TODAS" && !vacinasCobertura.includes(this.vacinal.form.vacinaEvolucao)) {
            this.vacinal.form.vacinaEvolucao = "TODAS";
          }

          if (this.vacinal.form.vacinaAtraso !== "TODAS" && !vacinasAtraso.includes(this.vacinal.form.vacinaAtraso)) {
            this.vacinal.form.vacinaAtraso = "TODAS";
          }

          this.vacinal.pagination.page = 1;
          this.suppressWatchers = false;

          if (!escolas.length) {
            this.topError = "Nenhuma escola foi encontrada para este usuário.";
          }

          if (renderCharts) {
            await nextTick();
            requestAnimationFrame(() => {
              setTimeout(() => {
                this.renderVacCharts();
              }, 80);
            });
          }
        },

        renderVacCharts() {
          this.destroyChart("vacChartEscola");
          this.destroyChart("vacChartTurma");
          this.destroyChart("vacChartVacina");
          this.destroyChart("vacChartVacinaInfantil");
          this.destroyChart("vacChartVacinaEscolar");
          this.destroyChart("vacChartSituacaoCompleta");
          this.destroyChart("vacChartEvolucao");

          const g = this.vacinal.graficos || {};
          const h = this.vacinal.historico || {};
          const tabela = Array.isArray(this.vacinal.tabela) ? this.vacinal.tabela : [];

          const atrasoPorTurmaFallback = (() => {
            const mapa = {};
            tabela.forEach(item => {
              const turma = String(item.turma || "SEM TURMA").trim() || "SEM TURMA";
              mapa[turma] = (mapa[turma] || 0) + 1;
            });
            const entries = Object.entries(mapa).sort((a, b) => b[1] - a[1]);
            return {
              labels: entries.map(x => x[0]),
              values: entries.map(x => x[1])
            };
          })();

          const cleanLabels = (arr) => (arr || []).map(label =>
            String(label || "").replace(/^\s*(INF|ESC)\s*-\s*/i, "").trim()
          );

          const valueLabelPlugin = {
            id: "valueLabelPlugin",
            afterDatasetsDraw(chart) {
              const { ctx } = chart;
              ctx.save();
              ctx.font = "bold 11px Arial";
              ctx.fillStyle = "#243b5a";
              ctx.textAlign = "center";
              ctx.textBaseline = "bottom";

              chart.data.datasets.forEach((dataset, datasetIndex) => {
                const meta = chart.getDatasetMeta(datasetIndex);
                meta.data.forEach((element, index) => {
                  const value = dataset.data[index];
                  if (value === null || value === undefined || value === "") return;
                  const pos = element.tooltipPosition();
                  ctx.fillText(String(value), pos.x, pos.y - 6);
                });
              });

              ctx.restore();
            }
          };

          const makeBar = (canvasId, labels, values, datasetLabel, suffix = "", maxY = null) => {
            const el = document.getElementById(canvasId);
            if (!el || !(labels || []).length) return null;
            const safeValues = (values || []).map(v => Number(v || 0));
            return markRaw(new Chart(el, {
              type: "bar",
              data: {
                labels: cleanLabels(labels || []),
                datasets: [{
                  label: datasetLabel,
                  data: safeValues
                }]
              },
              plugins: [valueLabelPlugin],
              options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: { top: 22 } },
                scales: {
                  y: {
                    beginAtZero: true,
                    ...(maxY !== null ? { max: maxY } : {})
                  }
                },
                plugins: {
                  legend: { display: false },
                  tooltip: {
                    callbacks: {
                      label: (context) => `${datasetLabel}: ${context.raw}${suffix}`
                    }
                  }
                }
              }
            }));
          };

          const makeLine = (canvasId, labels, values, datasetLabel, datasets = []) => {
            const el = document.getElementById(canvasId);
            if (!el || !(labels || []).length) return null;

            const chartDatasets = (datasets && datasets.length)
              ? datasets.map(ds => ({
                  label: ds.label || "Cobertura",
                  data: (ds.data || []).map(v => v === null || v === undefined ? null : Number(v)),
                  tension: 0.3,
                  spanGaps: true,
                  fill: false,
                  pointRadius: 3,
                  borderWidth: 3
                }))
              : [{
                  label: datasetLabel,
                  data: (values || []).map(v => v === null || v === undefined ? null : Number(v)),
                  tension: 0.3,
                  spanGaps: true,
                  fill: false,
                  pointRadius: 3,
                  borderWidth: 3
                }];

            chartDatasets.unshift({
              label: "Meta ministerial 95%",
              data: (labels || []).map(() => 95),
              borderDash: [6, 5],
              pointRadius: 0,
              borderWidth: 2,
              fill: false,
              tension: 0
            });

            return markRaw(new Chart(el, {
              type: "line",
              data: {
                labels: labels || [],
                datasets: chartDatasets
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                  mode: "index",
                  intersect: false
                },
                scales: {
                  y: {
                    beginAtZero: true,
                    max: 100
                  }
                },
                plugins: {
                  legend: {
                    display: true,
                    position: "bottom"
                  },
                  tooltip: {
                    callbacks: {
                      label: (context) => `${context.dataset.label}: ${context.raw}%`
                    }
                  }
                }
              }
            }));
          };


          const makeStacked = (canvasId, dados) => {
            const el = document.getElementById(canvasId);
            if (!el || !dados || !(dados.labels || []).length) return null;

            return markRaw(new Chart(el, {
              type: "bar",
              data: {
                labels: dados.labels || [],
                datasets: [
                  {
                    label: "Vacinados",
                    data: (dados.vacinados || []).map(v => Number(v || 0))
                  },
                  {
                    label: "Não vacinados",
                    data: (dados.naoVacinados || []).map(v => Number(v || 0))
                  },
                  {
                    label: "Sem informação",
                    data: (dados.semInfo || []).map(v => Number(v || 0))
                  }
                ]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                  x: {
                    stacked: true
                  },
                  y: {
                    stacked: true,
                    beginAtZero: true
                  }
                },
                plugins: {
                  legend: {
                    display: true,
                    position: "bottom"
                  },
                  tooltip: {
                    callbacks: {
                      afterBody: (items) => {
                        const idx = items && items.length ? items[0].dataIndex : null;
                        if (idx === null) return "";
                        const den = (dados.denominador || [])[idx] || 0;
                        return "Elegíveis: " + den;
                      }
                    }
                  }
                }
              }
            }));
          };
this.charts.vacChartSituacaoCompleta = makeStacked(
            "vacChartSituacaoCompleta",
            g.situacaoVacinalCompleta || { labels: [], vacinados: [], naoVacinados: [], semInfo: [], denominador: [] }
          );

          const mesesAbrilDezembro = ["ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
          const normalizarMesGrafico = (valor) => String(valor || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .trim()
            .toUpperCase();
          const indicesAbrilDezembro = (h.labels || [])
            .map((label, index) => ({ label, index }))
            .filter(item => mesesAbrilDezembro.includes(normalizarMesGrafico(item.label)))
            .sort((a, b) => mesesAbrilDezembro.indexOf(normalizarMesGrafico(a.label)) - mesesAbrilDezembro.indexOf(normalizarMesGrafico(b.label)))
            .map(item => item.index);
          const labelsEvolucao = indicesAbrilDezembro.length
            ? indicesAbrilDezembro.map(i => (h.labels || [])[i])
            : (h.labels || []);
          const valuesEvolucao = indicesAbrilDezembro.length
            ? indicesAbrilDezembro.map(i => (h.values || [])[i])
            : (h.values || []);
          const datasetsEvolucao = Array.isArray(h.datasets)
            ? h.datasets.map(ds => Object.assign({}, ds, {
                data: indicesAbrilDezembro.length
                  ? indicesAbrilDezembro.map(i => (ds.data || [])[i])
                  : (ds.data || [])
              }))
            : [];

          this.charts.vacChartEvolucao = makeLine(
            "vacChartEvolucao",
            labelsEvolucao,
            valuesEvolucao,
            h.titulo || "Evolução mensal da cobertura vacinal",
            datasetsEvolucao
          );

          const labelsRecebidos = Array.isArray(g.atrasoPorTurma?.labels) ? g.atrasoPorTurma.labels : [];
          const valuesRecebidos = Array.isArray(g.atrasoPorTurma?.values) ? g.atrasoPorTurma.values : [];
          const turmaLabels = labelsRecebidos.length ? labelsRecebidos : atrasoPorTurmaFallback.labels;
          const turmaValues = labelsRecebidos.length
            ? valuesRecebidos.map(v => Number(v || 0))
            : atrasoPorTurmaFallback.values.map(v => Number(v || 0));

          this.vacinalDebug.atrasoPorTurma = {
            labelsRecebidos: labelsRecebidos,
            valuesRecebidos: valuesRecebidos,
            labelsFallback: atrasoPorTurmaFallback.labels,
            valuesFallback: atrasoPorTurmaFallback.values,
            labelsUsados: turmaLabels,
            valuesUsados: turmaValues,
            totalTabela: tabela.length,
            turmasAmostra: tabela.slice(0, 10).map(item => ({
              nome: item.nome || "",

        async aplicarInicioEscolaDoLogin(payload) {
          this.currentView = "ranking";
          this.clearTopMessages();
          this.rankingAutoRetry = 0;

          if (!payload || payload.erro) {
            if (payload && payload.erro) console.warn("Início da escola não veio no login:", payload.erro);
            return false;
          }

          const rankingRecebido = payload.ranking || null;
          const historicoRecebido = payload.historico || null;

          if (rankingRecebido && Array.isArray(rankingRecebido.escolasPorCobertura)) {
            const flagsRanking = {
              modalAberto: this.ranking.modalAberto,
              modalTipo: this.ranking.modalTipo,
              modalTitulo: this.ranking.modalTitulo,
              modalIcone: this.ranking.modalIcone,
              modalPagina: this.ranking.modalPagina || 1,
              modalPorPagina: this.ranking.modalPorPagina || 10
            };

            this.ranking = Object.assign({
              atualizadoEm: "",
              resumo: {
                escolasMonitoradas: 0,
                unidadesMonitoradas: 0,
                escolasCriticas: 0,
                unidadeMaisCritica: "-",
                coberturaUnidadeMaisCritica: 0
              },
              escolasPorCobertura: [],
              unidadesPorCobertura: [],
              unidadesMaiorPendencia: []
            }, rankingRecebido || {}, flagsRanking);
          }

          if (historicoRecebido) {
            this.rankingHistorico = historicoRecebido;
          }

          await nextTick();
          this.renderRankingEvolucaoChart();

          const temRanking = Array.isArray(this.ranking?.escolasPorCobertura) && this.ranking.escolasPorCobertura.length > 0;
          if (!temRanking) {
            // Ainda assim deixa uma tentativa automática, mas sem depender do usuário trocar de aba.
            setTimeout(() => this.carregarRanking(), 700);
          }

          return temRanking;
        },

        async inicializarInicioEscolaAposLogin() {
          // Garante que a sessão já existe, a tela já foi renderizada e só então busca os dados.
          this.currentView = "ranking";
          this.clearTopMessages();
          this.rankingAutoRetry = 0;
          await nextTick();

          // Pequena espera evita a corrida entre criação da sessão no Apps Script e leitura do painel.
          await new Promise(resolve => setTimeout(resolve, 450));
          await this.carregarRanking();

          await nextTick();
          const temDados = Array.isArray(this.ranking?.escolasPorCobertura) && this.ranking.escolasPorCobertura.length > 0;

          // Reforço automático: se a primeira leitura vier vazia, tenta novamente sem o usuário trocar de aba.
          if (!temDados) {
            setTimeout(async () => {
              if (!this.isAuthenticated || this.isGestor || this.currentView !== "ranking") return;
              await this.carregarRanking();
            }, 1200);

            setTimeout(async () => {
              if (!this.isAuthenticated || this.isGestor || this.currentView !== "ranking") return;
              const aindaSemDados = !Array.isArray(this.ranking?.escolasPorCobertura) || !this.ranking.escolasPorCobertura.length;
              if (aindaSemDados) await this.carregarRanking();
            }, 2500);
          }
        },

        agendarRecarregamentoInicioEscola() {
          if (this.isGestor || this.currentView !== "ranking") return;
          const tentativa = Number(this.rankingAutoRetry || 0);
          if (tentativa >= 4) return;
          this.rankingAutoRetry = tentativa + 1;

          setTimeout(async () => {
            if (!this.isAuthenticated || this.isGestor || this.currentView !== "ranking") return;
            const temDados = Array.isArray(this.ranking?.escolasPorCobertura) && this.ranking.escolasPorCobertura.length > 0;
            if (!temDados && !this.loading) {
              await this.carregarRanking();
            }
          }, 900);
        },

        async carregarRanking() {
          this.clearTopMessages();
          this.loading = true;

          try {
            const data = await this.gas("getPainelRankingVacinal", this.sessionToken);
            const flagsRanking = {
              modalAberto: this.ranking.modalAberto,
              modalTipo: this.ranking.modalTipo,
              modalTitulo: this.ranking.modalTitulo,
              modalIcone: this.ranking.modalIcone,
              modalPagina: this.ranking.modalPagina || 1,
              modalPorPagina: this.ranking.modalPorPagina || 10
            };

            this.ranking = Object.assign({
              atualizadoEm: "",
              resumo: {
                escolasMonitoradas: 0,
                unidadesMonitoradas: 0,
                escolasCriticas: 0,
                unidadeMaisCritica: "-",
                coberturaUnidadeMaisCritica: 0
              },
              escolasPorCobertura: [],
              unidadesPorCobertura: [],
              unidadesMaiorPendencia: []
            }, data || {}, flagsRanking);

            if (Array.isArray(this.ranking.escolasPorCobertura) && this.ranking.escolasPorCobertura.length) {
              this.rankingAutoRetry = 0;
            }

            await nextTick();
            if (!this.isGestor) {
              await this.carregarHistoricoRanking();
              if (!Array.isArray(this.ranking.escolasPorCobertura) || !this.ranking.escolasPorCobertura.length) {
                this.agendarRecarregamentoInicioEscola();
              }
            }
          } catch (err) {
            this.handleError(err);
          } finally {
            this.loading = false;
          }
        },

        async carregarHistoricoRanking() {

          try {
